<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sri Shasha Prayathi Technologies Pvt. Ltd</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="page-header">
        <nav class="navbar" aria-label="Primary navigation">
            <a class="brand" href="index.html">
                <img class="brand-logo" src="assets/logo.png" alt="Sri Shasha Prayathi Technologies logo">
                <span class="brand-name">Sri Shasha Prayathi Technologies Pvt. Ltd</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="services.html">Product/Services</a>
                <a href="about.html">About Us</a>
                <a href="projects.html">Projects &amp; Achievements</a>
                <a href="contact.html">Contact Us</a>
                <a class="career-button" href="careers.html">Careers</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="section split contact-section page-section">
            <div>
                <p class="eyebrow">Contact Us</p>
                <h1>Tell us what you need to detect, track, or protect.</h1>
            </div>
            <div class="contact-stack">
                <form class="contact-form" data-form-type="contact">
                    <label>
                        Name
                        <input type="text" name="name" placeholder="Your name" required>
                    </label>
                    <label>
                        Email
                        <input type="email" name="email" placeholder="you@company.com" required>
                    </label>
                    <label>
                        Message
                        <textarea name="message" rows="4" placeholder="Project details" required></textarea>
                    </label>
                    <button type="submit">Send Message</button>
                    <p class="form-status" aria-live="polite"></p>
                </form>

                <article class="address-card">
                    <h3>Company Address</h3>
                    <p>Add your company address here.</p>
                    <a class="secondary-button" href="https://www.google.com/maps/search/?api=1&query=Sri%20Shasha%20Prayathi%20Technologies" target="_blank" rel="noopener">Open Google Map</a>
                    <div class="map-frame">
                        <iframe
                            title="Company location map"
                            src="https://www.google.com/maps?q=Sri%20Shasha%20Prayathi%20Technologies&output=embed"
                            loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </article>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
